# Fiyat taraması: cron → scrape → diff → otomatik PR (insan merge eder).
# Güvenlik: yalnız cron/manuel tetik (fork-PR yüzeyi yok), izinler dar,
# eşzamanlı koşu kuyruklanır (impact: failure-modes §3.2, §3.4, §3.6).
name: price-scrape

on:
  schedule:
    - cron: '0 4 * * *' # 04:00 UTC = 07:00 TR — düşük trafik penceresi
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: price-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Kötü gün bütçesi: 23 bölge × (20s timeout + retry + 15s stagger)
    # ≈ 25-30 dk olabilir; 30 dk'lık tavan sessiz yarıda-kesilme üretir.
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 0-5 dk rastgele jitter: tüm hedeflere aynı saniyede istek atmayı
      # ve GitHub'ın cron yığılma pencerelerini yumuşatır.
      - name: Jitter
        run: sleep $((RANDOM % 300))

      - run: npm ci

      - name: Testler (scrape öncesi kapı)
        run: npm test

      - name: Scrape + diff
        id: scrape
        run: node scraper/index.js

      # Rapor her koşulda (validasyon hatası dahil) insan-görünür olsun.
      - name: Koşu özeti
        if: always()
        run: |
          if [ -f .scrape-out/report.md ]; then
            cat .scrape-out/report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      # NOT: GITHUB_TOKEN ile açılan PR, ci.yml'in pull_request tetiğini
      # ÇALIŞTIRMAZ (GitHub'ın bilinçli kısıtı). PR'daki veri yine de iki
      # kapıdan geçmiştir: bu job'daki `npm test` + index.js'in yazmadan
      # önceki validateCatalog kapısı. ci.yml PR'da da koşsun istenirse
      # `token:` alanına PAT verilmeli.
      - name: PR aç / güncelle
        id: pr
        if: steps.scrape.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          # Sabit branch = idempotent: önceki PR açıkken yeni diff gelirse
          # aynı PR güncellenir, ikinci PR açılmaz (failure-modes §3.3).
          branch: automated/price-updates
          commit-message: 'Fiyat güncellemesi (otomatik tarama)'
          title: 'Fiyat güncellemesi — otomatik tarama'
          body-path: .scrape-out/report.md
          labels: price-change
          add-paths: |
            catalog.json
            changes/latest.json

      # TAM OTOMATİK MOD (kullanıcı kararı 2026-07-09): sanity + validasyon
      # + kur kontrolünden geçen PR insan beklemeden merge edilir. Karantina/
      # anomali PR'a zaten giremez — onlar issue olarak insana düşer.
      # NOT: GITHUB_TOKEN merge'i history.yml'i TETİKLEMEZ (GitHub kuralı),
      # bu yüzden history burada inline yenilenir.
      - name: Otomatik merge + history
        if: steps.scrape.outputs.has_updates == 'true' && steps.pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pull-request-number }}
        run: |
          # Mergeable durumu birkaç saniye gecikebilir — kısa retry.
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR_NUMBER" --squash --delete-branch; then
              MERGED=1; break
            fi
            sleep 10
          done
          if [ -z "$MERGED" ]; then
            echo "::error::Otomatik merge başarısız — PR #$PR_NUMBER insan onayı bekliyor"
            exit 1
          fi
          git fetch origin main && git checkout main && git pull --ff-only
          node scraper/bin/regenerate-history.js
          if ! git diff --quiet history.json; then
            git config user.name "duesday-bot"
            git config user.email "actions@github.com"
            git add history.json
            git commit -m "history.json regenerate (otomatik)"
            git push origin main
          fi

      # Karantina/anomali/hata insan gözüne issue olarak düşer — sessiz
      # yutma yok (anayasa §9 ruhu CI'da da geçerli). Scrape hatası da
      # dahil: hata süren servis = sessizce bayatlayan fiyat = kaçan
      # güncelleme. Rapor tek issue'da birikir (günlük en çok 1 yorum).
      - name: Anomali/karantina issue'su
        if: always() && (steps.scrape.outputs.run_anomaly == 'true' || steps.scrape.outputs.has_quarantine == 'true' || steps.scrape.outputs.has_failures == 'true')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="Scraper dikkat: $(date -u +%F) koşusunda anomali/karantina"
          # Etiket yoksa oluştur (ilk koşu temiz repoda kırılmasın).
          gh label create scraper-alert --color D93F0B \
            --description "Scraper anomali/karantina uyarısı" || true
          EXISTING=$(gh issue list --label scraper-alert --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file .scrape-out/report.md
          else
            gh issue create --title "$TITLE" --label scraper-alert --body-file .scrape-out/report.md
          fi

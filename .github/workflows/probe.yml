# Kalibrasyon sondası: tek servis-bölgenin sayfasını CI runner'ın (US IP)
# gözünden döker. Salt okuma — katalog/CDN'e dokunmaz, PR açmaz.
# Selector/pattern kalibrasyonu bu çıktıya bakılarak yapılır (kör kalibrasyon
# PR #3'te yanlış fiyat yayınlattı).
name: probe

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Servis id (services.config.json ile birebir)'
        required: true
      region:
        description: 'Bölge (tr/us)'
        required: true
        default: 'us'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Girdiler shell'e env üzerinden girer (workflow-injection hijyeni).
      - name: Probe
        env:
          SERVICE: ${{ inputs.service }}
          REGION: ${{ inputs.region }}
        run: node scraper/bin/probe.js "$SERVICE" "$REGION"
